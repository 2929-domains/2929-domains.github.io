<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #6c7086;
            --accent-pink: #f38ba8;
            --accent-purple: #cba6f7;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using your colors for a smooth mesh gradient */
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(243, 139, 168, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(203, 166, 247, 0.3) 0px, transparent 50%);
            overflow: hidden;
            position: relative;
        }

        /* Decorative Animated Elements */
        .shape {
            position: absolute;
            filter: blur(60px);
            z-index: 0;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        .shape-1 { 
            width: 400px; height: 400px; 
            background: var(--accent-pink); 
            top: -10%; left: -10%; 
            opacity: 0.4;
        }
        .shape-2 { 
            width: 350px; height: 350px; 
            background: var(--accent-purple); 
            bottom: -5%; right: -5%; 
            opacity: 0.4;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 50px); }
        }

        /* Glass Card */
        .glass-container {
            width: 90%;
            max-width: 480px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            z-index: 1;
            color: var(--white);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(243, 139, 168, 0.15);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.12);
        }

        button {
            background: var(--accent-purple);
            color: #313244; /* Darker text for contrast */
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--accent-pink);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(243, 139, 168, 0.3);
        }

        /* Footer links */
        .socials {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .socials span:hover {
            color: var(--accent-purple);
            cursor: pointer;
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <main class="glass-container">
        <span class="status-badge">In Development</span>
        <h1>Coming Soon</h1>
        <p>We're building something special with a focus on design and simplicity. Stay tuned!</p>    

        <div class="socials">
            

            <a href="https://github.com/2929-domains"><span>Github</span></a>
        </div>
    </main>

</body>
</html>
