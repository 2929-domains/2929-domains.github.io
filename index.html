<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Catppuccin Mocha</title>
    <style>
        /* Catppuccin Mocha Palette */
        :root {
            --rosewater: #f5e0dc;
            --flamingo: #f2cdcd;
            --pink: #f5c2e7;
            --mauve: #cba6f7;
            --red: #f38ba8;
            --maroon: #eba0ac;
            --peach: #fab387;
            --yellow: #f9e2af;
            --green: #a6e3a1;
            --teal: #94e2d5;
            --sky: #89dceb;
            --sapphire: #74c7ec;
            --blue: #89b4fa;
            --lavender: #b4befe;
            --text: #cdd6f4;
            --subtext1: #bac2de;
            --subtext0: #a6adc8;
            --overlay2: #9399b2;
            --surface2: #585b70;
            --surface0: #313244;
            --base: #1e1e2e;
            --mantle: #181825;
            --crust: #11111b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--base);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background-color: var(--mantle);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--surface0);
            animation: slideUp 0.8s ease-out;
        }

        .status-badge {
            display: inline-block;
            background-color: var(--surface0);
            color: var(--mauve);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border: 1px solid var(--mauve);
        }

        h1 {
            color: var(--lavender);
            font-size: 2.2rem;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--subtext0);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Input Group */
        .input-group {
            display: flex;
            background: var(--crust);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--surface0);
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--blue);
        }

        input {
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: var(--text);
            flex: 1;
            outline: none;
            font-size: 1rem;
        }

        button {
            background-color: var(--blue);
            color: var(--crust);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Small link footer */
        .links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .links a {
            color: var(--overlay2);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--peach);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .input-group { flex-direction: column; background: transparent; border: none; padding: 0; }
            input { background: var(--crust); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--surface0); }
            button { width: 100%; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="status-badge">Under Construction</span>
        <h1>Brewing Something New</h1>
        <p>Our digital workspace is currently under maintenance. We're adding some fresh flavor to the experience.</p>
        

        <div class="links">
            <a href="https://github.com/2929-domains">Github</a>
        
        
        </div>
    </div>

</body>
</html>
